<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verbi Irregolari - Quiz & Tabella Completa</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Stili della tabella */
        table { border-collapse: collapse; width: 100%; font-size: 14px; }
        th { position: sticky; top: 0; background-color: #4f46e5; color: white; z-index: 10; }
        td, th { border: 1px solid #cbd5e1; padding: 10px; }
        
        .given-form {
            background-color: #f3f4f6 !important;
            color: #4b5563 !important;
            cursor: not-allowed;
        }

        .hard-mode-active {
            border-color: #dc2626 !important;
            background-color: #fef2f2;
        }

        /* Colori Gruppi */
        .gr-viola { background-color: #e5d1ff; }
        .gr-verde { background-color: #d1f7d1; }
        .gr-azzurro { background-color: #d1e9ff; }
        .gr-giallo { background-color: #fff4cc; }
        .gr-rosso { background-color: #ffd1d1; }
        .gr-grigio { background-color: #f2f2f2; }
        .gr-arancio { background-color: #ffead1; }

        @media print {
            .no-print { display: none !important; }
            table { font-size: 10pt !important; width: 100% !important; }
        }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans">

    <!-- SEZIONE QUIZ INTERATTIVO -->
    <div class="max-w-5xl mx-auto mb-10 no-print">
        <div id="quizBox" class="bg-white rounded-2xl shadow-xl overflow-hidden border-4 border-indigo-600 transition-all duration-300">
            <div id="quizHeader" class="bg-indigo-600 p-5 text-white flex justify-between items-center transition-colors">
                <div class="flex flex-col">
                    <h2 id="quizTitle" class="text-xl font-bold flex items-center gap-2">🧠 Quiz Verbi Irregolari</h2>
                    <span class="text-xs opacity-80">[Spazio] Prossima casella | [Invio] Controlla / Prossimo</span>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2 bg-black/20 p-2 rounded-lg">
                        <span class="text-xs font-bold uppercase">Difficile</span>
                        <input type="checkbox" id="hardModeToggle" onchange="toggleHardMode()" class="w-5 h-5 cursor-pointer">
                    </div>
                    <span id="scoreCounter" class="bg-indigo-800 px-3 py-1 rounded-full text-sm font-mono font-bold">Punti: 0</span>
                </div>
            </div>
            
            <div class="p-8 text-center">
                <div class="mb-6">
                    <span id="quizInstruction" class="text-gray-500 text-sm uppercase font-bold tracking-widest">Indizio:</span>
                    <h3 id="targetHint" class="text-4xl font-black text-gray-800 mt-2 italic">---</h3>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-gray-400 uppercase">Base Form</label>
                        <div class="relative">
                            <input id="qBase" type="text" autocomplete="off" class="quiz-input w-full border-2 border-gray-200 p-3 rounded-xl text-center font-bold focus:border-indigo-500 outline-none transition-all" placeholder="...">
                            <button onclick="showHint()" title="Aiuto" class="absolute right-2 top-1/2 -translate-y-1/2 text-yellow-500 hover:scale-110 transition-transform focus:outline-none">💡</button>
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-gray-400 uppercase">Past Simple</label>
                        <input id="qPast" type="text" autocomplete="off" class="quiz-input w-full border-2 border-gray-200 p-3 rounded-xl text-center font-bold focus:border-indigo-500 outline-none transition-all" placeholder="...">
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-gray-400 uppercase">Past Participle</label>
                        <input id="qPart" type="text" autocomplete="off" class="quiz-input w-full border-2 border-gray-200 p-3 rounded-xl text-center font-bold focus:border-indigo-500 outline-none transition-all" placeholder="...">
                    </div>
                </div>

                <div id="tradDisplay" class="mb-6 text-indigo-500 font-bold hidden">
                    Traduzione: <span id="valTrad">---</span>
                </div>

                <div id="quizFeedback" class="hidden mb-6 p-4 rounded-xl text-lg font-bold flex flex-col items-center gap-3"></div>

                <div class="flex flex-wrap justify-center gap-4">
                    <button id="btnCheck" onclick="checkQuiz()" class="bg-green-500 text-white px-8 py-3 rounded-xl font-bold hover:bg-green-600 shadow-lg transition-all active:scale-95">CONTROLLA ✅</button>
                    <button id="btnNext" onclick="newQuestion()" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-indigo-700 shadow-lg transition-all active:scale-95">PROSSIMO ➡️</button>
                </div>
            </div>
        </div>
    </div>

    <!-- AREA TABELLA E CATTURA IMMAGINE -->
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-4 no-print">
            <h2 class="text-2xl font-bold text-gray-800">Tutti i Verbi Irregolari</h2>
            <button onclick="downloadImage()" class="bg-indigo-600 text-white px-6 py-2 rounded-full font-bold shadow-lg hover:bg-indigo-700 active:scale-95 transition-all">
                📸 SALVA COME FOTO
            </button>
        </div>

        <div id="captureArea" class="bg-white shadow-2xl rounded-xl overflow-hidden border border-gray-200 p-4">
            <div class="bg-gray-800 p-4 text-white text-center rounded-t-lg mb-4">
                <h1 class="text-xl font-bold uppercase tracking-widest">Schema Completo Verbi Irregolari</h1>
                <p class="text-xs text-gray-400">🔥 = Verbi Avanzati (Hard Mode)</p>
            </div>
            
            <div class="overflow-x-auto">
                <table id="fullTable">
                    <thead>
                        <tr>
                            <th>Base Form</th>
                            <th>Past Simple</th>
                            <th>Past Participle</th>
                            <th>Traduzione</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Generato via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const groupsDef = {
            'fondamentali': { title: 'Verbi Fondamentali', bg: '#e5d1ff', text: '#6b21a8' },
            'invariati': { title: '1. Invariati (Tutte Uguali)', bg: '#d1f7d1', text: '#166534' },
            'basepart':  { title: '2. Base = Participio', bg: '#ffead1', text: '#9a3412' },
            'iau':       { title: '3. Cambio Vocale (I - A - U)', bg: '#fff4cc', text: '#854d0e' },
            'ought':     { title: '4. Terminazione -OUGHT/-AUGHT', bg: '#d1e9ff', text: '#1e40af' },
            'identici':  { title: '5. Past Simple = Participio', bg: '#f2f2f2', text: '#374151' },
            'diversi':   { title: '6. Tutti Diversi (-EN)', bg: '#ffd1d1', text: '#991b1b' }
        };

        const allVerbs = [
            {b:"be", p:"was/were", pp:"been", t:"essere", g:"fondamentali", hard:false},
            {b:"do", p:"did", pp:"done", t:"fare", g:"fondamentali", hard:false},
            {b:"go", p:"went", pp:"gone", t:"andare", g:"fondamentali", hard:false},
            {b:"can", p:"could", pp:"been able", t:"potere", g:"fondamentali", hard:false},

            {b:"cost", p:"cost", pp:"cost", t:"costare", g:"invariati", hard:false},
            {b:"cut", p:"cut", pp:"cut", t:"tagliare", g:"invariati", hard:false},
            {b:"hit", p:"hit", pp:"hit", t:"colpire", g:"invariati", hard:false},
            {b:"hurt", p:"hurt", pp:"hurt", t:"farsi male", g:"invariati", hard:false},
            {b:"let", p:"let", pp:"let", t:"permettere", g:"invariati", hard:false},
            {b:"put", p:"put", pp:"put", t:"mettere", g:"invariati", hard:false},
            {b:"read", p:"read", pp:"read", t:"leggere", g:"invariati", hard:false},
            {b:"shut", p:"shut", pp:"shut", t:"chiudere", g:"invariati", hard:false},
            {b:"split", p:"split", pp:"split", t:"dividere", g:"invariati", hard:true},

            {b:"become", p:"became", pp:"become", t:"diventare", g:"basepart", hard:false},
            {b:"come", p:"came", pp:"come", t:"venire", g:"basepart", hard:false},
            {b:"run", p:"ran", pp:"run", t:"correre", g:"basepart", hard:false},

            {b:"begin", p:"began", pp:"begun", t:"iniziare", g:"iau", hard:false},
            {b:"drink", p:"drank", pp:"drunk", t:"bere", g:"iau", hard:false},
            {b:"ring", p:"rang", pp:"rung", t:"suonare", g:"iau", hard:false},
            {b:"sing", p:"sang", pp:"sung", t:"cantare", g:"iau", hard:false},
            {b:"swim", p:"swam", pp:"swum", t:"nuotare", g:"iau", hard:false},

            {b:"bring", p:"brought", pp:"brought", t:"portare", g:"ought", hard:false},
            {b:"buy", p:"bought", pp:"bought", t:"comprare", g:"ought", hard:false},
            {b:"catch", p:"caught", pp:"caught", t:"afferrare", g:"ought", hard:false},
            {b:"fight", p:"fought", pp:"fought", t:"combattere", g:"ought", hard:false},
            {b:"teach", p:"taught", pp:"taught", t:"insegnare", g:"ought", hard:false},
            {b:"think", p:"thought", pp:"thought", t:"pensare", g:"ought", hard:false},

            {b:"build", p:"built", pp:"built", t:"costruire", g:"identici", hard:false},
            {b:"feel", p:"felt", pp:"felt", t:"sentire", g:"identici", hard:false},
            {b:"find", p:"found", pp:"found", t:"trovare", g:"identici", hard:false},
            {b:"get", p:"got", pp:"got", t:"ottenere", g:"identici", hard:false},
            {b:"have", p:"had", pp:"had", t:"avere", g:"identici", hard:false},
            {b:"hear", p:"heard", pp:"heard", t:"udire", g:"identici", hard:false},
            {b:"keep", p:"kept", pp:"kept", t:"mantenere", g:"identici", hard:false},
            {b:"leave", p:"left", pp:"left", t:"lasciare", g:"identici", hard:false},
            {b:"make", p:"made", pp:"made", t:"fare", g:"identici", hard:false},
            {b:"meet", p:"met", pp:"met", t:"incontrare", g:"identici", hard:false},
            {b:"say", p:"said", pp:"said", t:"dire", g:"identici", hard:false},
            {b:"send", p:"sent", pp:"sent", t:"spedire", g:"identici", hard:false},
            {b:"sleep", p:"slept", pp:"slept", t:"dormire", g:"identici", hard:false},
            {b:"tell", p:"told", pp:"told", t:"raccontare", g:"identici", hard:false},
            {b:"win", p:"won", pp:"won", t:"vincere", g:"identici", hard:false},

            {b:"break", p:"broke", pp:"broken", t:"rompere", g:"diversi", hard:false},
            {b:"choose", p:"chose", pp:"chosen", t:"scegliere", g:"diversi", hard:false},
            {b:"drive", p:"drove", pp:"driven", t:"guidare", g:"diversi", hard:false},
            {b:"eat", p:"ate", pp:"eaten", t:"mangiare", g:"diversi", hard:false},
            {b:"fall", p:"fell", pp:"fallen", t:"cadere", g:"diversi", hard:false},
            {b:"fly", p:"flew", pp:"flown", t:"volare", g:"diversi", hard:false},
            {b:"forget", p:"forgot", pp:"forgotten", t:"dimenticare", g:"diversi", hard:false},
            {b:"give", p:"gave", pp:"given", t:"dare", g:"diversi", hard:false},
            {b:"know", p:"knew", pp:"known", t:"sapere", g:"diversi", hard:false},
            {b:"see", p:"saw", pp:"seen", t:"vedere", g:"diversi", hard:false},
            {b:"speak", p:"spoke", pp:"spoken", t:"parlare", g:"diversi", hard:false},
            {b:"take", p:"took", pp:"taken", t:"prendere", g:"diversi", hard:false},
            {b:"write", p:"wrote", pp:"written", t:"scrivere", g:"diversi", hard:false}
        ];

        let points = 0;
        let currentVerb = null;
        let isChecked = false;
        let isHardMode = false;

        // INIZIALIZZAZIONE TABELLA
        const tbody = document.getElementById('tableBody');
        Object.entries(groupsDef).forEach(([key, group]) => {
            const hRow = document.createElement('tr');
            hRow.innerHTML = `<td colspan="4" class="text-center font-bold text-white uppercase bg-gray-700 py-2">${group.title}</td>`;
            tbody.appendChild(hRow);

            allVerbs.filter(v => v.g === key).forEach(v => {
                const row = document.createElement('tr');
                row.style.backgroundColor = group.bg;
                row.innerHTML = `<td class="font-bold">${v.b}</td><td>${v.p}</td><td>${v.pp}</td><td class="italic">${v.t} ${v.hard ? '🔥' : ''}</td>`;
                tbody.appendChild(row);
            });
        });

        function toggleHardMode() {
            isHardMode = document.getElementById('hardModeToggle').checked;
            const quizBox = document.getElementById('quizBox');
            const quizHeader = document.getElementById('quizHeader');
            const quizTitle = document.getElementById('quizTitle');

            if(isHardMode) {
                quizBox.classList.add('hard-mode-active');
                quizHeader.classList.replace('bg-indigo-600', 'bg-red-700');
                quizTitle.innerText = "🔥 Quiz Verbi - HARD MODE";
            } else {
                quizBox.classList.remove('hard-mode-active');
                quizHeader.classList.replace('bg-red-700', 'bg-indigo-600');
                quizTitle.innerText = "🧠 Quiz Verbi Irregolari";
            }
            newQuestion();
        }

        function newQuestion() {
            isChecked = false;
            const pool = isHardMode ? allVerbs : allVerbs.filter(v => !v.hard);
            currentVerb = pool[Math.floor(Math.random() * pool.length)];
            
            const modes = ['t', 'b', 'p', 'pp'];
            const mode = modes[Math.floor(Math.random() * modes.length)];

            document.getElementById('quizFeedback').classList.add('hidden');
            ['qBase', 'qPast', 'qPart'].forEach(id => {
                const el = document.getElementById(id);
                el.value = ""; el.disabled = false;
                el.classList.remove('given-form', 'bg-green-100', 'bg-red-100', 'text-indigo-600');
            });

            if (mode === 't') {
                document.getElementById('quizInstruction').innerText = "Traduci in inglese:";
                document.getElementById('targetHint').innerText = currentVerb.t.toUpperCase();
            } else if (mode === 'b') {
                document.getElementById('quizInstruction').innerText = "Dalla Base Form:";
                document.getElementById('targetHint').innerText = currentVerb.b;
                fillAndLock('qBase', currentVerb.b);
            } else if (mode === 'p') {
                document.getElementById('quizInstruction').innerText = "Dal Past Simple:";
                document.getElementById('targetHint').innerText = currentVerb.p;
                fillAndLock('qPast', currentVerb.p);
            } else {
                document.getElementById('quizInstruction').innerText = "Dal Past Participle:";
                document.getElementById('targetHint').innerText = currentVerb.pp;
                fillAndLock('qPart', currentVerb.pp);
            }

            document.getElementById('tradDisplay').classList.toggle('hidden', mode === 't');
            document.getElementById('valTrad').innerText = currentVerb.t;

            setTimeout(() => { document.querySelector('.quiz-input:not(:disabled)')?.focus(); }, 50);
        }

        function fillAndLock(id, val) {
            const el = document.getElementById(id);
            el.value = val; el.disabled = true; el.classList.add('given-form');
        }

        function showHint() {
            const el = document.getElementById('qBase');
            if(!el.disabled) { el.value = currentVerb.b; el.classList.add('text-indigo-600'); }
        }

        function checkQuiz() {
            if(isChecked) return;
            isChecked = true;
            const b = document.getElementById('qBase').value.trim().toLowerCase();
            const p = document.getElementById('qPast').value.trim().toLowerCase();
            const pp = document.getElementById('qPart').value.trim().toLowerCase();
            
            const isB = b === currentVerb.b.toLowerCase() || currentVerb.b.toLowerCase().split('/').includes(b);
            const isP = p === currentVerb.p.toLowerCase() || currentVerb.p.toLowerCase().split('/').includes(p);
            const isPP = pp === currentVerb.pp.toLowerCase() || currentVerb.pp.toLowerCase().split('/').includes(pp);

            ['qBase', 'qPast', 'qPart'].forEach((id, i) => {
                const el = document.getElementById(id);
                if(!el.disabled) el.classList.add([isB, isP, isPP][i] ? 'bg-green-100' : 'bg-red-100');
            });

            const feedback = document.getElementById('quizFeedback');
            const grp = groupsDef[currentVerb.g];
            feedback.classList.remove('hidden');
            const badge = `<div class="px-4 py-1 mt-2 rounded-full text-xs font-bold" style="background:${grp.bg}; color:${grp.text}">Gruppo: ${grp.title}</div>`;

            if(isB && isP && isPP) {
                feedback.innerHTML = `<span class="text-green-600">Corretto! 🎉</span>${badge}`;
                points += isHardMode ? 20 : 10;
            } else {
                feedback.innerHTML = `<span class="text-red-600">Sbagliato. Era: ${currentVerb.b} - ${currentVerb.p} - ${currentVerb.pp}</span>${badge}`;
                points = Math.max(0, points - 5);
            }
            document.getElementById('scoreCounter').innerText = "Punti: " + points;
        }

        function downloadImage() {
            const btn = document.querySelector('button[onclick="downloadImage()"]');
            btn.innerText = "⏳ SALVATAGGIO...";
            html2canvas(document.querySelector("#captureArea"), { scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'tabella_verbi_irregolari.png';
                link.href = canvas.toDataURL();
                link.click();
                btn.innerText = "📸 SALVA COME FOTO";
            });
        }

        document.addEventListener('keydown', e => {
            if(e.code === 'Enter') isChecked ? newQuestion() : checkQuiz();
            if(e.code === 'Space' && document.activeElement.classList.contains('quiz-input')) {
                e.preventDefault();
                const inputs = [...document.querySelectorAll('.quiz-input:not(:disabled)')];
                inputs[(inputs.indexOf(document.activeElement) + 1) % inputs.length].focus();
            }
        });

        window.onload = newQuestion;
    </script>
</body>
</html>
