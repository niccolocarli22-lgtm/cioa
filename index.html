<!DOCTYPE html>

    <style>
        table { border-collapse: collapse; width: 100%; font-size: 13px; }

        td { border: 1px solid #e2e8f0; padding: 8px 12px; }
        .given-form { background-color: #f8fafc !important; color: #94a3b8 !important; cursor: not-allowed; }
        .hard-row { font-style: italic; color: #b91c1c; }
        .quiz-input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }
    </style>

<body class="bg-slate-50 p-4 font-sans">

    <!-- SEZIONE QUIZ -->
    <div class="max-w-6xl mx-auto mb-10 no-print">
        <div id="quizBox" class="bg-white rounded-3xl shadow-2xl border-4 border-slate-200 overflow-hidden transition-all">
            <div id="quizHeader" class="bg-slate-800 p-6 text-white flex justify-between items-center">
                <div>
                    <h2 id="quizTitle" class="text-2xl font-black flex items-center gap-2">📚 Verb Master Pro</h2>
                    <p class="text-xs opacity-70">Oltre 140 verbi nel database</p>
                </div>
                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-3 bg-white/10 p-3 rounded-xl border border-white/20">
                        <span class="text-sm font-bold uppercase tracking-tighter">Hard Mode 🔥</span>
                        <input type="checkbox" id="hardModeToggle" onchange="toggleHardMode()" class="w-6 h-6 cursor-pointer accent-red-500">
                    </div>
                    <div class="text-right">
                        <span id="scoreCounter" class="text-2xl font-mono font-bold text-yellow-400">000</span>
                        <p class="text-[10px] uppercase font-bold opacity-50 text-center">Score</p>
                    </div>
                </div>
            </div>
            
            <div class="p-8">
                <div class="text-center mb-10">
                    <span id="quizInstruction" class="text-slate-400 text-xs uppercase font-black tracking-[0.2em]">Traduzione / Indizio</span>
                    <h3 id="targetHint" class="text-5xl font-black text-slate-800 mt-2">---</h3>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Base Form</label>
                        <input id="qBase" type="text" autocomplete="off" class="quiz-input w-full border-2 border-slate-200 p-4 rounded-2xl text-center font-bold text-xl outline-none" placeholder="...">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Past Simple</label>
                        <input id="qPast" type="text" autocomplete="off" class="quiz-input w-full border-2 border-slate-200 p-4 rounded-2xl text-center font-bold text-xl outline-none" placeholder="...">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Past Participle</label>
                        <input id="qPart" type="text" autocomplete="off" class="quiz-input w-full border-2 border-slate-200 p-4 rounded-2xl text-center font-bold text-xl outline-none" placeholder="...">
                    </div>
                </div>

                <div id="quizFeedback" class="hidden mb-8 p-5 rounded-2xl text-center font-bold text-lg animate-bounce"></div>

                <div class="flex justify-center gap-4">
                    <button id="btnCheck" onclick="checkQuiz()" class="bg-emerald-500 text-white px-10 py-4 rounded-2xl font-black shadow-lg hover:bg-emerald-600 transition-all active:scale-95">CONTROLLA</button>
                    <button id="btnNext" onclick="newQuestion()" class="bg-slate-800 text-white px-10 py-4 rounded-2xl font-black shadow-lg hover:bg-slate-900 transition-all active:scale-95">PROSSIMO</button>
                </div>
            </div>
        </div>
    </div>

    <!-- TABELLA COMPLETA -->

        function initTable() {
            const container = document.getElementById('tableContainer');
            container.innerHTML = "";
            document.getElementById('verbCount').innerText = allVerbs.length;

            Object.entries(groupsDef).forEach(([key, group]) => {
                const section = document.createElement('div');
                section.className = "mb-8";
                
                const table = document.createElement('table');
                table.innerHTML = `
                    <thead>
                        <tr><th colspan="4" style="background:${group.text}">${group.title}</th></tr>
                        <tr class="bg-slate-200 text-slate-600 font-bold">
                            <td width="25%">Base Form</td>
                            <td width="25%">Past Simple</td>
                            <td width="25%">Past Participle</td>
                            <td width="25%">Traduzione</td>
                        </tr>
                    </thead>
                    <tbody></tbody>
                `;

                const tbody = table.querySelector('tbody');
                allVerbs.filter(v => v.g === key).forEach(v => {
                    const tr = document.createElement('tr');
                    tr.style.backgroundColor = v.h ? '#fff1f2' : group.bg;
                    if(v.h) tr.classList.add('hard-row');
                    tr.innerHTML = `
                        <td class="font-bold">${v.b}</td>
                        <td>${v.p}</td>
                        <td>${v.pp}</td>
                        <td>${v.t} ${v.h ? '🔥' : ''}</td>
                    `;
                    tbody.appendChild(tr);
                });
                section.appendChild(table);
                container.appendChild(section);
            });
        }

            isHardMode = document.getElementById('hardModeToggle').checked;
            const header = document.getElementById('quizHeader');
            const title = document.getElementById('quizTitle');
            
            if(isHardMode) {
                header.classList.replace('bg-slate-800', 'bg-red-800');
                title.innerText = "🔥 Hard Mode Active";
            } else {
                header.classList.replace('bg-red-800', 'bg-slate-800');
                title.innerText = "📚 Verb Master Pro";
            }
            newQuestion();
        }

        function newQuestion() {
            isChecked = false;
            const pool = isHardMode ? allVerbs.filter(v => v.h) : allVerbs.filter(v => !v.h);
            currentVerb = pool[Math.floor(Math.random() * pool.length)];
            
            const mode = ['t', 'b', 'p', 'pp'][Math.floor(Math.random() * 4)];
            document.getElementById('quizFeedback').classList.add('hidden');
            
            ['qBase', 'qPast', 'qPart'].forEach(id => {
                const el = document.getElementById(id);
                el.value = ""; el.disabled = false;
                el.className = "quiz-input w-full border-2 border-slate-200 p-4 rounded-2xl text-center font-bold text-xl outline-none";
            });

            if (mode === 't') {
                document.getElementById('quizInstruction').innerText = "Traduci:";
                document.getElementById('targetHint').innerText = currentVerb.t.toUpperCase();
            } else if (mode === 'b') {
                document.getElementById('quizInstruction').innerText = "Dalla Base Form:";
                document.getElementById('targetHint').innerText = currentVerb.b;
                fillAndLock('qBase', currentVerb.b);
            } else if (mode === 'p') {
                document.getElementById('quizInstruction').innerText = "Dal Past Simple:";
                document.getElementById('targetHint').innerText = currentVerb.p;
                fillAndLock('qPast', currentVerb.p);
            } else {
                document.getElementById('quizInstruction').innerText = "Dal Past Participle:";
                document.getElementById('targetHint').innerText = currentVerb.pp;
                fillAndLock('qPart', currentVerb.pp);
            }
            
            setTimeout(() => document.querySelector('.quiz-input:not(:disabled)')?.focus(), 100);
        }

        function fillAndLock(id, val) {
            const el = document.getElementById(id);
            el.value = val; el.disabled = true; el.classList.add('given-form');
        }

        function checkQuiz() {
            if(isChecked) return;
            isChecked = true;

            const userB = document.getElementById('qBase').value.trim().toLowerCase();
            const userP = document.getElementById('qPast').value.trim().toLowerCase();
            const userPP = document.getElementById('qPart').value.trim().toLowerCase();

            const correctB = currentVerb.b.toLowerCase().split('/').includes(userB);
            const correctP = currentVerb.p.toLowerCase().split('/').includes(userP);
            const correctPP = currentVerb.pp.toLowerCase().split('/').includes(userPP);

            const feedback = document.getElementById('quizFeedback');
            feedback.classList.remove('hidden');

            if(correctB && correctP && correctPP) {
                feedback.innerText = "ECCELLENTE! +10 Punti 🏆";
                feedback.className = "mb-8 p-5 rounded-2xl text-center font-bold text-lg text-emerald-600 bg-emerald-50";
                points += 10;
            } else {
                feedback.innerHTML = `Ops! La risposta era: <br> <span class="text-slate-800 text-xl">${currentVerb.b} - ${currentVerb.p} - ${currentVerb.pp}</span>`;
                feedback.className = "mb-8 p-5 rounded-2xl text-center font-bold text-lg text-rose-600 bg-rose-50";
                points = Math.max(0, points - 5);
            }
            
            document.getElementById('scoreCounter').innerText = points.toString().padStart(3, '0');
            
            // Colora i campi singolarmente
            document.getElementById('qBase').classList.add(correctB ? 'bg-emerald-50' : 'bg-rose-50');
            document.getElementById('qPast').classList.add(correctP ? 'bg-emerald-50' : 'bg-rose-50');
            document.getElementById('qPart').classList.add(correctPP ? 'bg-emerald-50' : 'bg-rose-50');
        }

        function downloadImage() {
            const btn = document.querySelector('button[onclick="downloadImage()"]');
            btn.innerText = "ELABORAZIONE...";
            html2canvas(document.querySelector("#captureArea"), { scale: 1.5, useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'lista_140_verbi_irregolari.png';
                link.href = canvas.toDataURL();
                link.click();
                btn.innerText = "📸 SALVA COME IMMAGINE";
            });
        }

        document.addEventListener('keydown', e => {
            if(e.key === 'Enter') isChecked ? newQuestion() : checkQuiz();
        });

        window.onload = () => {
            initTable();
            newQuestion();
        };
    </script>
</body>
</html>
