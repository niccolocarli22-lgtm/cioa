<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Verbs Master - 144 Verbi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .verb-card { transition: transform 0.2s; border-left: 4px solid #e2e8f0; }
        .verb-card:hover { transform: translateY(-2px); }
        .hard-mode-active { border-color: #ef4444 !important; background: #fef2f2; }
        .shortcut-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #e2e8f0; color: #475569; font-weight: bold; margin-left: 4px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- HEADER & QUIZ -->
    <div class="max-w-6xl mx-auto space-y-6 no-print">
        <div class="bg-slate-900 rounded-3xl p-8 text-white shadow-2xl">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                <div>
                    <h1 class="text-3xl font-black tracking-tighter">VERB MASTER PRO 🔥</h1>
                    <p class="text-slate-400 text-sm">Database completo: 144 verbi caricati</p>
                </div>
                <div class="flex items-center gap-4 bg-slate-800 p-2 rounded-2xl border border-slate-700">
                    <span class="text-xs font-bold px-3">HARD MODE</span>
                    <button id="hardToggle" onclick="toggleHardMode()" class="w-12 h-6 bg-slate-600 rounded-full relative transition-colors">
                        <div id="toggleDot" class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition-all"></div>
                    </button>
                    <div class="ml-4 border-l border-slate-700 pl-4 pr-2 text-right">
                        <div id="score" class="text-2xl font-black text-yellow-400">0</div>
                        <div class="text-[10px] text-slate-500 uppercase tracking-widest">Score</div>
                    </div>
                </div>
            </div>

            <div class="text-center py-6">
                <span id="qType" class="text-indigo-400 text-[10px] font-black uppercase tracking-[0.3em]">Traduzione</span>
                <h2 id="qPrompt" class="text-5xl font-black mt-2 mb-10">...</h2>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-4xl mx-auto mb-8">
                    <div class="relative group">
                        <label class="absolute -top-3 left-4 bg-slate-900 px-2 text-[10px] font-bold text-slate-500">BASE FORM <span class="shortcut-badge">ALT+1</span></label>
                        <input id="inBase" type="text" autocomplete="off" class="w-full bg-transparent border-2 border-slate-700 p-4 rounded-xl text-center text-xl font-bold focus:border-indigo-500 outline-none transition-all">
                    </div>
                    <div class="relative group">
                        <label class="absolute -top-3 left-4 bg-slate-900 px-2 text-[10px] font-bold text-slate-500">PAST SIMPLE <span class="shortcut-badge">ALT+2</span></label>
                        <input id="inPast" type="text" autocomplete="off" class="w-full bg-transparent border-2 border-slate-700 p-4 rounded-xl text-center text-xl font-bold focus:border-indigo-500 outline-none transition-all">
                    </div>
                    <div class="relative group">
                        <label class="absolute -top-3 left-4 bg-slate-900 px-2 text-[10px] font-bold text-slate-500">PAST PARTICIPLE <span class="shortcut-badge">ALT+3</span></label>
                        <input id="inPart" type="text" autocomplete="off" class="w-full bg-transparent border-2 border-slate-700 p-4 rounded-xl text-center text-xl font-bold focus:border-indigo-500 outline-none transition-all">
                    </div>
                </div>

                <div id="feedback" class="h-12 flex items-center justify-center font-bold text-lg mb-6"></div>

                <div class="flex flex-wrap justify-center gap-4">
                    <button onclick="checkAnswer()" class="bg-indigo-600 hover:bg-indigo-500 px-8 py-3 rounded-xl font-black transition-all active:scale-95 shadow-lg">CONTROLLA (Invio)</button>
                    <button onclick="giveHint()" class="bg-slate-700 hover:bg-slate-600 px-8 py-3 rounded-xl font-black transition-all">SUGGERIMENTO</button>
                    <button onclick="nextQuestion()" class="bg-white text-slate-900 hover:bg-slate-200 px-8 py-3 rounded-xl font-black transition-all">PROSSIMO</button>
                </div>
            </div>
        </div>
    </div>

    <!-- LISTA VERBI -->
    <div class="max-w-6xl mx-auto mt-12">
        <div class="flex justify-between items-end mb-6">
            <div>
                <h2 class="text-3xl font-black text-slate-800">Dizionario Irregolare</h2>
                <p class="text-slate-500">Tutti i 144 verbi classificati per gruppo</p>
            </div>
            <button onclick="saveImage()" class="no-print bg-emerald-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-emerald-700 shadow-lg flex items-center gap-2">
                📸 SALVA LISTA
            </button>
        </div>

        <div id="verbListContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
            <!-- Riempito via JS -->
        </div>
    </div>

        let current = null;
        let points = 0;
        let hardMode = false;

        function initList() {
            const container = document.getElementById('verbListContainer');
            container.innerHTML = "";
            verbs.forEach(v => {
                const div = document.createElement('div');
                div.className = `verb-card p-4 rounded-xl shadow-sm bg-white border border-slate-100 ${v.h ? 'hard-mode-active' : ''}`;
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-sm font-black text-indigo-600 uppercase tracking-tighter">${v.b}</span>
                        ${v.h ? '<span class="text-xs">🔥</span>' : ''}
                    </div>
                    <div class="text-xs text-slate-400 font-mono mb-2">${v.p} • ${v.pp}</div>
                    <div class="text-[10px] font-bold text-slate-600 uppercase">${v.t}</div>
                `;
                container.appendChild(div);
            });
        }

        function toggleHardMode() {
            hardMode = !hardMode;
            document.getElementById('toggleDot').style.left = hardMode ? '26px' : '4px';
            document.getElementById('hardToggle').classList.toggle('bg-red-500');
            nextQuestion();
        }

        function nextQuestion() {
            const pool = hardMode ? verbs.filter(v => v.h) : verbs;
            current = pool[Math.floor(Math.random() * pool.length)];
            
            document.getElementById('feedback').innerText = "";
            document.getElementById('qPrompt').innerText = current.t.toUpperCase();
            
            ['inBase', 'inPast', 'inPart'].forEach(id => {
                const el = document.getElementById(id);
                el.value = "";
                el.classList.remove('border-emerald-500', 'border-rose-500');
            });
            document.getElementById('inBase').focus();
        }

        function checkAnswer() {
            const b = document.getElementById('inBase').value.trim().toLowerCase();
            const p = document.getElementById('inPast').value.trim().toLowerCase();
            const pp = document.getElementById('inPart').value.trim().toLowerCase();

            const isB = current.b.split('/').includes(b);
            const isP = current.p.split('/').includes(p);
            const isPP = current.pp.split('/').includes(pp);

            const fd = document.getElementById('feedback');
            
            if(isB && isP && isPP) {
                fd.innerText = "CORRETTO! +10";
                fd.className = "h-12 flex items-center justify-center font-bold text-lg mb-6 text-emerald-400";
                points += 10;
                setTimeout(nextQuestion, 1000);
            } else {
                fd.innerHTML = `SBAGLIATO! Corretto: ${current.b} - ${current.p} - ${current.pp}`;
                fd.className = "h-12 flex items-center justify-center font-bold text-lg mb-6 text-rose-400";
                points = Math.max(0, points - 5);
            }
            document.getElementById('score').innerText = points;
        }

        function giveHint() {
            const b = document.getElementById('inBase');
            const p = document.getElementById('inPast');
            const pp = document.getElementById('inPart');

            if(!b.value) b.value = current.b[0] + "...";
            else if(!p.value) p.value = current.p[0] + "...";
            else if(!pp.value) pp.value = current.pp[0] + "...";
            points = Math.max(0, points - 2);
            document.getElementById('score').innerText = points;
        }

        function saveImage() {
            const container = document.getElementById('verbListContainer');
            html2canvas(container).then(canvas => {
                const link = document.createElement('a');
                link.download = 'lista-verbi-irregolari.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        // Scorciatoie da tastiera
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') checkAnswer();
            if (e.altKey && e.key === '1') document.getElementById('inBase').value = current.b;
            if (e.altKey && e.key === '2') document.getElementById('inPast').value = current.p;
            if (e.altKey && e.key === '3') document.getElementById('inPart').value = current.pp;
        });

        window.onload = () => {
            initList();
            nextQuestion();
        };
    </script>
</body>
</html>
