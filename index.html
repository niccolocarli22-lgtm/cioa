<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verbi Irregolari - Pro Level</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Colori dei Gruppi */
        .group-invariati td { background-color: #d1f7d1 !important; }
        .group-basepart td { background-color: #ffead1 !important; }
        .group-iau td { background-color: #fff4cc !important; }
        .group-ought td { background-color: #d1e9ff !important; }
        .group-identici td { background-color: #f2f2f2 !important; }
        .group-diversi td { background-color: #ffd1d1 !important; }
        
        table { border-collapse: collapse; width: 100%; }
        th { position: sticky; top: 0; background-color: #4f46e5; color: white; z-index: 10; }
        td, th { border: 1px solid #cbd5e1; padding: 10px; }
        
        .group-header td { 
            color: white; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            text-align: center;
        }

        .given-form {
            background-color: #f3f4f6 !important;
            color: #4b5563 !important;
            cursor: not-allowed;
        }

        .hard-mode-active {
            border-color: #dc2626 !important;
            background-color: #fef2f2;
        }

        @media print {
            .no-print { display: none !important; }
            table { font-size: 10pt !important; width: 100% !important; }
        }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans">

    <!-- SEZIONE QUIZ INTERATTIVO -->
    <div class="max-w-5xl mx-auto mb-10 no-print">
        <div id="quizBox" class="bg-white rounded-2xl shadow-xl overflow-hidden border-4 border-indigo-600 transition-all duration-300">
            <div id="quizHeader" class="bg-indigo-600 p-5 text-white flex justify-between items-center transition-colors">
                <div class="flex flex-col">
                    <h2 id="quizTitle" class="text-xl font-bold flex items-center gap-2">🧠 Quiz Verbi Irregolari</h2>
                    <span class="text-xs opacity-80">[Spazio] Salta | [Invio] Controlla/Next</span>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2 bg-black/20 p-2 rounded-lg">
                        <span class="text-xs font-bold uppercase">Difficile</span>
                        <input type="checkbox" id="hardModeToggle" onchange="toggleHardMode()" class="w-5 h-5 cursor-pointer">
                    </div>
                    <span id="scoreCounter" class="bg-indigo-800 px-3 py-1 rounded-full text-sm font-mono font-bold">Punti: 0</span>
                </div>
            </div>
            
            <div class="p-8 text-center">
                <div class="mb-6">
                    <span id="quizInstruction" class="text-gray-500 text-sm uppercase font-bold tracking-widest">Indizio:</span>
                    <h3 id="targetHint" class="text-4xl font-black text-gray-800 mt-2 italic">---</h3>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <!-- Base Form -->
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-gray-400 uppercase">Base Form</label>
                        <div class="relative">
                            <input id="qBase" type="text" autocomplete="off" class="quiz-input w-full border-2 border-gray-200 p-3 rounded-xl text-center font-bold focus:border-indigo-500 outline-none transition-all" placeholder="...">
                            <button id="btnHint" onclick="showHint()" title="Aiuto" class="absolute right-2 top-1/2 -translate-y-1/2 text-yellow-500 hover:scale-110 transition-transform focus:outline-none">
                                💡
                            </button>
                        </div>
                    </div>
                    <!-- Past Simple -->
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-gray-400 uppercase">Past Simple</label>
                        <input id="qPast" type="text" autocomplete="off" class="quiz-input w-full border-2 border-gray-200 p-3 rounded-xl text-center font-bold focus:border-indigo-500 outline-none transition-all" placeholder="...">
                    </div>
                    <!-- Past Participle -->
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-gray-400 uppercase">Past Participle</label>
                        <input id="qPart" type="text" autocomplete="off" class="quiz-input w-full border-2 border-gray-200 p-3 rounded-xl text-center font-bold focus:border-indigo-500 outline-none transition-all" placeholder="...">
                    </div>
                </div>

                <div id="tradDisplay" class="mb-6 text-indigo-500 font-bold hidden">
                    Traduzione: <span id="valTrad">---</span>
                </div>

                <div id="quizFeedback" class="hidden mb-6 p-4 rounded-xl text-lg font-bold"></div>

                <div class="flex flex-wrap justify-center gap-4">
                    <button id="btnCheck" onclick="checkQuiz()" class="bg-green-500 text-white px-8 py-3 rounded-xl font-bold hover:bg-green-600 shadow-lg transition-all active:scale-95">
                        CONTROLLA ✅
                    </button>
                    <button id="btnNext" onclick="newQuestion()" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-indigo-700 shadow-lg transition-all active:scale-95">
                        PROSSIMO VERBO ➡️
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- TABELLA COMPLETA -->
    <div class="max-w-5xl mx-auto bg-white shadow-2xl rounded-xl overflow-hidden mb-10 border border-gray-200">
        <div class="bg-gray-800 p-6 text-white flex justify-between items-center">
            <h1 class="text-2xl font-bold">Tutti i Verbi Irregolari</h1>
            <button onclick="window.print()" class="no-print bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-lg font-bold">STAMPA</button>
        </div>
        <div class="overflow-x-auto">
            <table id="fullTable">
                <thead>
                    <tr>
                        <th class="w-1/4">Base Form</th>
                        <th class="w-1/4">Past Simple</th>
                        <th class="w-1/4">Past Participle</th>
                        <th class="w-1/4">Traduzione</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const allVerbs = [
            // FACILI (Normal Mode)
            {b:"be", p:"was/were", pp:"been", t:"essere", g:"group-diversi", hard:false, h:"1. Verbi Essenziali"},
            {b:"have", p:"had", pp:"had", t:"avere", g:"group-identici", hard:false},
            {b:"do", p:"did", pp:"done", t:"fare", g:"group-diversi", hard:false},
            {b:"go", p:"went", pp:"gone", t:"andare", g:"group-diversi", hard:false},
            {b:"say", p:"said", pp:"said", t:"dire", g:"group-identici", hard:false},
            {b:"see", p:"saw", pp:"seen", t:"vedere", g:"group-diversi", hard:false},
            {b:"make", p:"made", pp:"made", t:"fare/creare", g:"group-identici", hard:false},
            {b:"get", p:"got", pp:"got", t:"ottenere", g:"group-identici", hard:false},
            {b:"take", p:"took", pp:"taken", t:"prendere", g:"group-diversi", hard:false},
            {b:"come", p:"came", pp:"come", t:"venire", g:"group-basepart", hard:false},
            {b:"know", p:"knew", pp:"known", t:"sapere", g:"group-diversi", hard:false},
            {b:"think", p:"thought", pp:"thought", t:"pensare", g:"group-ought", hard:false},
            {b:"give", p:"gave", pp:"given", t:"dare", g:"group-diversi", hard:false},
            {b:"find", p:"found", pp:"found", t:"trovare", g:"group-identici", hard:false},
            {b:"write", p:"wrote", pp:"written", t:"scrivere", g:"group-diversi", hard:false},
            {b:"eat", p:"ate", pp:"eaten", t:"mangiare", g:"group-diversi", hard:false},
            {b:"drink", p:"drank", pp:"drunk", t:"bere", g:"group-iau", hard:false},
            {b:"sleep", p:"slept", pp:"slept", t:"dormire", g:"group-identici", hard:false},
            {b:"run", p:"ran", pp:"run", t:"correre", g:"group-basepart", hard:false},
            {b:"buy", p:"bought", pp:"bought", t:"comprare", g:"group-ought", hard:false},
            {b:"speak", p:"spoke", pp:"spoken", t:"parlare", g:"group-diversi", hard:false},
            {b:"read", p:"read", pp:"read", t:"leggere", g:"group-invariati", hard:false},
            {b:"win", p:"won", pp:"won", t:"vincere", g:"group-identici", hard:false},
            
            // DIFFICILI (Hard Mode)
            {b:"arise", p:"arose", pp:"arisen", t:"sorgere", g:"group-diversi", hard:true, h:"2. Verbi Avanzati"},
            {b:"awake", p:"awoke", pp:"awoken", t:"svegliarsi", g:"group-diversi", hard:true},
            {b:"bear", p:"bore", pp:"borne", t:"sopportare", g:"group-diversi", hard:true},
            {b:"bind", p:"bound", pp:"bound", t:"legare", g:"group-identici", hard:true},
            {b:"bleed", p:"bled", pp:"bled", t:"sanguinare", g:"group-identici", hard:true},
            {b:"breed", p:"bred", pp:"bred", t:"allevare", g:"group-identici", hard:true},
            {b:"cling", p:"clung", pp:"clung", t:"aggrapparsi", g:"group-identici", hard:true},
            {b:"creep", p:"crept", pp:"crept", t:"strisciare", g:"group-identici", hard:true},
            {b:"deal", p:"dealt", pp:"dealt", t:"trattare", g:"group-identici", hard:true},
            {b:"dwell", p:"dwelt", pp:"dwelt", t:"dimorare", g:"group-identici", hard:true},
            {b:"fling", p:"flung", pp:"flung", t:"scagliare", g:"group-identici", hard:true},
            {b:"forbid", p:"forbade", pp:"forbidden", t:"proibire", g:"group-diversi", hard:true},
            {b:"grind", p:"ground", pp:"ground", t:"macinare", g:"group-identici", hard:true},
            {b:"kneel", p:"knelt", pp:"knelt", t:"inginocchiarsi", g:"group-identici", hard:true},
            {b:"lean", p:"leant", pp:"leant", t:"appoggiarsi", g:"group-identici", hard:true},
            {b:"leap", p:"leapt", pp:"leapt", t:"saltare", g:"group-identici", hard:true},
            {b:"saw", p:"sawed", pp:"sawn", t:"segare", g:"group-diversi", hard:true},
            {b:"shed", p:"shed", pp:"shed", t:"spargere", g:"group-invariati", hard:true},
            {b:"shrink", p:"shrank", pp:"shrunk", t:"restringere", g:"group-iau", hard:true},
            {b:"sink", p:"sank", pp:"sunk", t:"affondare", g:"group-iau", hard:true},
            {b:"slide", p:"slid", pp:"slid", t:"scivolare", g:"group-identici", hard:true},
            {b:"sling", p:"slung", pp:"slung", t:"lanciare", g:"group-identici", hard:true},
            {b:"slink", p:"slunk", pp:"slunk", t:"muoversi furtivamente", g:"group-identici", hard:true},
            {b:"slit", p:"slit", pp:"slit", t:"fendere", g:"group-invariati", hard:true},
            {b:"sow", p:"sowed", pp:"sown", t:"seminare", g:"group-diversi", hard:true},
            {b:"spit", p:"spat", pp:"spat", t:"sputare", g:"group-identici", hard:true},
            {b:"split", p:"split", pp:"split", t:"dividere", g:"group-invariati", hard:true},
            {b:"sting", p:"stung", pp:"stung", t:"pungere", g:"group-identici", hard:true},
            {b:"stink", p:"stank", pp:"stunk", t:"puzzare", g:"group-iau", hard:true},
            {b:"stride", p:"strode", pp:"stridden", t:"camminare a grandi passi", g:"group-diversi", hard:true},
            {b:"strike", p:"struck", pp:"struck", t:"colpire", g:"group-identici", hard:true},
            {b:"strive", p:"strove", pp:"striven", t:"sforzarsi", g:"group-diversi", hard:true},
            {b:"swear", p:"swore", pp:"sworn", t:"giurare", g:"group-diversi", hard:true},
            {b:"sweep", p:"swept", pp:"swept", t:"spazzare", g:"group-identici", hard:true},
            {b:"swing", p:"swung", pp:"swung", t:"oscillare", g:"group-identici", hard:true},
            {b:"tread", p:"trod", pp:"trodden", t:"calpestare", g:"group-diversi", hard:true},
            {b:"undergo", p:"underwent", pp:"undergone", t:"subire", g:"group-diversi", hard:true},
            {b:"uphold", p:"upheld", pp:"upheld", t:"sostenere", g:"group-identici", hard:true},
            {b:"weave", p:"wove", pp:"woven", t:"tessere", g:"group-diversi", hard:true},
            {b:"weep", p:"wept", pp:"wept", t:"piangere", g:"group-identici", hard:true},
            {b:"wind", p:"wound", pp:"wound", t:"avvolgere", g:"group-identici", hard:true},
            {b:"wring", p:"wrung", pp:"wrung", t:"strizzare", g:"group-identici", hard:true}
        ];

        let points = 0;
        let isChecked = false;
        let currentVerb = null;
        let isHardMode = false;

        // Inizializzazione Tabella
        const tbody = document.getElementById('tableBody');
        allVerbs.forEach(v => {
            if(v.h) {
                const hRow = document.createElement('tr');
                hRow.className = `group-header ${v.g.replace('group-', 'bg-')}-600`;
                hRow.innerHTML = `<td colspan="4">${v.h}</td>`;
                tbody.appendChild(hRow);
            }
            const row = document.createElement('tr');
            row.className = v.g;
            row.innerHTML = `<td class="font-bold">${v.b}</td><td>${v.p}</td><td>${v.pp}</td><td class="italic text-gray-600">${v.t}</td>`;
            tbody.appendChild(row);
        });

        // Toggle Modalità Difficile
        function toggleHardMode() {
            isHardMode = document.getElementById('hardModeToggle').checked;
            const quizBox = document.getElementById('quizBox');
            const quizHeader = document.getElementById('quizHeader');
            const quizTitle = document.getElementById('quizTitle');

            if(isHardMode) {
                quizBox.classList.add('hard-mode-active');
                quizHeader.classList.replace('bg-indigo-600', 'bg-red-700');
                quizTitle.innerText = "🔥 Quiz Verbi - HARD MODE";
            } else {
                quizBox.classList.remove('hard-mode-active');
                quizHeader.classList.replace('bg-red-700', 'bg-indigo-600');
                quizTitle.innerText = "🧠 Quiz Verbi Irregolari";
            }
            newQuestion();
        }

        // Shortcut da tastiera
        document.addEventListener('keydown', (e) => {
            const active = document.activeElement;
            const isInput = active.classList.contains('quiz-input');

            if (e.code === 'Space' && isInput) {
                e.preventDefault();
                const inputs = Array.from(document.querySelectorAll('.quiz-input:not(:disabled)'));
                const idx = inputs.indexOf(active);
                if (idx < inputs.length - 1) inputs[idx + 1].focus();
                else inputs[0].focus();
            }

            if (e.code === 'Enter') {
                if (!isChecked) checkQuiz();
                else newQuestion();
            }
        });

        function newQuestion() {
            isChecked = false;
            const pool = isHardMode ? allVerbs : allVerbs.filter(v => !v.hard);
            currentVerb = pool[Math.floor(Math.random() * pool.length)];
            
            const modes = ['t', 'b', 'p', 'pp'];
            const mode = modes[Math.floor(Math.random() * modes.length)];

            document.getElementById('quizFeedback').classList.add('hidden');
            const inputs = ['qBase', 'qPast', 'qPart'];
            inputs.forEach(id => {
                const el = document.getElementById(id);
                el.value = "";
                el.disabled = false;
                el.classList.remove('given-form', 'bg-green-100', 'bg-red-100', 'text-indigo-600');
            });
            document.getElementById('tradDisplay').classList.add('hidden');

            const hintH3 = document.getElementById('targetHint');
            const instr = document.getElementById('quizInstruction');

            if (mode === 't') {
                instr.innerText = "Traduci in inglese:";
                hintH3.innerText = currentVerb.t.toUpperCase();
            } else if (mode === 'b') {
                instr.innerText = "Dalla Base Form:";
                hintH3.innerText = currentVerb.b;
                fillAndLock('qBase', currentVerb.b);
            } else if (mode === 'p') {
                instr.innerText = "Dal Past Simple:";
                hintH3.innerText = currentVerb.p;
                fillAndLock('qPast', currentVerb.p);
            } else {
                instr.innerText = "Dal Past Participle:";
                hintH3.innerText = currentVerb.pp;
                fillAndLock('qPart', currentVerb.pp);
            }

            if(mode !== 't') {
                document.getElementById('tradDisplay').classList.remove('hidden');
                document.getElementById('valTrad').innerText = currentVerb.t;
            }

            setTimeout(() => {
                const first = document.querySelectorAll('.quiz-input:not(:disabled)')[0];
                if(first) first.focus();
            }, 50);
        }

        function fillAndLock(id, val) {
            const el = document.getElementById(id);
            el.value = val;
            el.disabled = true;
            el.classList.add('given-form');
        }

        function showHint() {
            const qBase = document.getElementById('qBase');
            if(!qBase.disabled) {
                qBase.value = currentVerb.b;
                qBase.classList.add('text-indigo-600');
            }
        }

        function checkQuiz() {
            if(isChecked) return;
            isChecked = true;

            const b = document.getElementById('qBase').value.trim().toLowerCase();
            const p = document.getElementById('qPast').value.trim().toLowerCase();
            const pp = document.getElementById('qPart').value.trim().toLowerCase();

            const check = (val, target) => {
                const targets = target.toLowerCase().split('/').map(s => s.trim());
                return targets.includes(val);
            };

            const isB = check(b, currentVerb.b);
            const isP = check(p, currentVerb.p);
            const isPP = check(pp, currentVerb.pp);

            document.getElementById('qBase').classList.add(!document.getElementById('qBase').disabled ? (isB ? 'bg-green-100' : 'bg-red-100') : 'given-form');
            document.getElementById('qPast').classList.add(!document.getElementById('qPast').disabled ? (isP ? 'bg-green-100' : 'bg-red-100') : 'given-form');
            document.getElementById('qPart').classList.add(!document.getElementById('qPart').disabled ? (isPP ? 'bg-green-100' : 'bg-red-100') : 'given-form');

            const feedback = document.getElementById('quizFeedback');
            feedback.classList.remove('hidden');
            
            if(isB && isP && isPP) {
                feedback.innerText = "FANTASTICO! 🎉";
                feedback.className = "mb-6 p-4 rounded-xl text-lg font-bold bg-green-100 text-green-700";
                points += isHardMode ? 20 : 10;
            } else {
                feedback.innerHTML = `Corretto era: <span class="text-indigo-600">${currentVerb.b} - ${currentVerb.p} - ${currentVerb.pp}</span>`;
                feedback.className = "mb-6 p-4 rounded-xl text-lg font-bold bg-red-100 text-red-700";
                points = Math.max(0, points - (isHardMode ? 10 : 5));
            }
            document.getElementById('scoreCounter').innerText = "Punti: " + points;
        }

        window.onload = newQuestion;
    </script>
</body>
</html>
