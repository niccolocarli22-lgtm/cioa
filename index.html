<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabella Verbi Irregolari & Quiz Multimodale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Colori dei Gruppi */
        .group-invariati td { background-color: #d1f7d1 !important; }
        .group-basepart td { background-color: #ffead1 !important; }
        .group-iau td { background-color: #fff4cc !important; }
        .group-ought td { background-color: #d1e9ff !important; }
        .group-identici td { background-color: #f2f2f2 !important; }
        .group-diversi td { background-color: #ffd1d1 !important; }
        
        table { border-collapse: collapse; width: 100%; }
        th { position: sticky; top: 0; background-color: #4f46e5; color: white; z-index: 10; }
        td, th { border: 1px solid #cbd5e1; padding: 10px; }
        
        .group-header td { 
            color: white; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            text-align: center;
        }

        .given-form {
            background-color: #f3f4f6 !important;
            color: #4b5563 !important;
            cursor: not-allowed;
        }

        @media print {
            body { background-color: white !important; padding: 0 !important; margin: 0 !important; }
            .no-print { display: none !important; }
            .max-w-5xl { max-width: 100% !important; box-shadow: none !important; border: none !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            table { font-size: 10pt !important; width: 100% !important; page-break-inside: auto; }
            thead { display: table-header-group; }
            tr { page-break-inside: avoid; page-break-after: auto; }
        }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans">

    <!-- SEZIONE QUIZ INTERATTIVO -->
    <div class="max-w-5xl mx-auto mb-10 no-print">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border-4 border-indigo-600">
            <div class="bg-indigo-600 p-5 text-white flex justify-between items-center">
                <div class="flex flex-col">
                    <h2 class="text-xl font-bold flex items-center gap-2">🧠 Quiz Verbi Irregolari</h2>
                    <span class="text-xs opacity-80">[Spazio] Prossima casella | [Invio] Controlla/Prossimo</span>
                </div>
                <span id="scoreCounter" class="bg-indigo-800 px-3 py-1 rounded-full text-sm font-mono">Punti: 0</span>
            </div>
            
            <div class="p-8 text-center">
                <div class="mb-6">
                    <span id="quizInstruction" class="text-gray-500 text-sm uppercase font-bold tracking-widest text-indigo-600">Indizio:</span>
                    <h3 id="targetHint" class="text-4xl font-black text-gray-800 mt-2 italic">---</h3>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <!-- Base Form -->
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-gray-400 uppercase">Base Form</label>
                        <div class="relative">
                            <input id="qBase" type="text" class="quiz-input w-full border-2 border-gray-200 p-3 rounded-xl text-center font-bold focus:border-indigo-500 outline-none transition-all" placeholder="...">
                            <button id="btnHint" onclick="showHint()" title="Aiuto" class="absolute right-2 top-1/2 -translate-y-1/2 text-yellow-500 hover:scale-110 transition-transform focus:outline-none">
                                💡
                            </button>
                        </div>
                    </div>
                    <!-- Past Simple -->
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-gray-400 uppercase">Past Simple</label>
                        <input id="qPast" type="text" class="quiz-input w-full border-2 border-gray-200 p-3 rounded-xl text-center font-bold focus:border-indigo-500 outline-none transition-all" placeholder="...">
                    </div>
                    <!-- Past Participle -->
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-gray-400 uppercase">Past Participle</label>
                        <input id="qPart" type="text" class="quiz-input w-full border-2 border-gray-200 p-3 rounded-xl text-center font-bold focus:border-indigo-500 outline-none transition-all" placeholder="...">
                    </div>
                </div>

                <!-- Traduzione piccola di supporto -->
                <div id="tradDisplay" class="mb-6 text-indigo-500 font-bold hidden">
                    Traduzione: <span id="valTrad">---</span>
                </div>

                <div id="quizFeedback" class="hidden mb-6 p-4 rounded-xl text-lg font-bold"></div>

                <div class="flex flex-wrap justify-center gap-4">
                    <button id="btnCheck" onclick="checkQuiz()" class="bg-green-500 text-white px-8 py-3 rounded-xl font-bold hover:bg-green-600 shadow-lg transition-all active:scale-95">
                        CONTROLLA ✅
                    </button>
                    <button id="btnNext" onclick="newQuestion()" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-indigo-700 shadow-lg transition-all active:scale-95">
                        PROSSIMO VERBO ➡️
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- TABELLA COMPLETA -->
    <div class="max-w-5xl mx-auto bg-white shadow-2xl rounded-xl overflow-hidden mb-10 border border-gray-200">
        <div class="bg-gray-800 p-6 text-white flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="text-center sm:text-left">
                <h1 class="text-2xl font-bold">Tabella Completa Verbi Irregolari</h1>
                <p class="text-gray-400 text-sm">Oltre 140 verbi organizzati per gruppi</p>
            </div>
            <button onclick="window.print()" class="no-print bg-indigo-600 text-white px-5 py-2 rounded-lg font-bold hover:bg-indigo-500 transition-colors shadow-md">
                STAMPA LISTA
            </button>
        </div>

        <div class="overflow-x-auto">
            <table id="fullTable">
                <thead>
                    <tr>
                        <th class="w-1/4">Base Form</th>
                        <th class="w-1/4">Past Simple</th>
                        <th class="w-1/4">Past Participle</th>
                        <th class="w-1/4">Traduzione</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Popolato via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const verbs = [
            // Invariati
            {b:"bet", p:"bet", pp:"bet", t:"scommettere", g:"group-invariati", h:"1. Verbi Invariati"},
            {b:"cost", p:"cost", pp:"cost", t:"costare", g:"group-invariati"},
            {b:"cut", p:"cut", pp:"cut", t:"tagliare", g:"group-invariati"},
            {b:"hit", p:"hit", pp:"hit", t:"colpire", g:"group-invariati"},
            {b:"hurt", p:"hurt", pp:"hurt", t:"farsi male", g:"group-invariati"},
            {b:"let", p:"let", pp:"let", t:"permettere", g:"group-invariati"},
            {b:"put", p:"put", pp:"put", t:"mettere", g:"group-invariati"},
            {b:"read", p:"read", pp:"read", t:"leggere", g:"group-invariati"},
            {b:"shut", p:"shut", pp:"shut", t:"chiudere", g:"group-invariati"},
            // Base = Part
            {b:"become", p:"became", pp:"become", t:"diventare", g:"group-basepart", h:"2. Base = Participio"},
            {b:"come", p:"came", pp:"come", t:"venire", g:"group-basepart"},
            {b:"run", p:"ran", pp:"run", t:"correre", g:"group-basepart"},
            // I-A-U
            {b:"begin", p:"began", pp:"begun", t:"iniziare", g:"group-iau", h:"3. Cambio Vocale (I-A-U)"},
            {b:"drink", p:"drank", pp:"drunk", t:"bere", g:"group-iau"},
            {b:"ring", p:"rang", pp:"rung", t:"suonare", g:"group-iau"},
            {b:"sing", p:"sang", pp:"sung", t:"cantare", g:"group-iau"},
            {b:"sink", p:"sank", pp:"sunk", t:"affondare", g:"group-iau"},
            {b:"swim", p:"swam", pp:"swum", t:"nuotare", g:"group-iau"},
            // Ought
            {b:"bring", p:"brought", pp:"brought", t:"portare", g:"group-ought", h:"4. OUGHT / AUGHT"},
            {b:"buy", p:"bought", pp:"bought", t:"comprare", g:"group-ought"},
            {b:"catch", p:"caught", pp:"caught", t:"afferrare", g:"group-ought"},
            {b:"fight", p:"fought", pp:"fought", t:"combattere", g:"group-ought"},
            {b:"teach", p:"taught", pp:"taught", t:"insegnare", g:"group-ought"},
            {b:"think", p:"thought", pp:"thought", t:"pensare", g:"group-ought"},
            // Identici
            {b:"build", p:"built", pp:"built", t:"costruire", g:"group-identici", h:"5. Past = Participio"},
            {b:"feel", p:"felt", pp:"felt", t:"sentire", g:"group-identici"},
            {b:"find", p:"found", pp:"found", t:"trovare", g:"group-identici"},
            {b:"get", p:"got", pp:"got", t:"ottenere", g:"group-identici"},
            {b:"have", p:"had", pp:"had", t:"avere", g:"group-identici"},
            {b:"hear", p:"heard", pp:"heard", t:"udire", g:"group-identici"},
            {b:"keep", p:"kept", pp:"kept", t:"mantenere", g:"group-identici"},
            {b:"leave", p:"left", pp:"left", t:"lasciare", g:"group-identici"},
            {b:"make", p:"made", pp:"made", t:"fare", g:"group-identici"},
            {b:"meet", p:"met", pp:"met", t:"incontrare", g:"group-identici"},
            {b:"say", p:"said", pp:"said", t:"dire", g:"group-identici"},
            {b:"send", p:"sent", pp:"sent", t:"spedire", g:"group-identici"},
            {b:"sit", p:"sat", pp:"sat", t:"sedersi", g:"group-identici"},
            {b:"sleep", p:"slept", pp:"slept", t:"dormire", g:"group-identici"},
            {b:"slide", p:"slid", pp:"slid", t:"scivolare", g:"group-identici"},
            {b:"spend", p:"spent", pp:"spent", t:"spendere", g:"group-identici"},
            {b:"tell", p:"told", pp:"told", t:"dire/raccontare", g:"group-identici"},
            {b:"win", p:"won", pp:"won", t:"vincere", g:"group-identici"},
            // Diversi
            {b:"be", p:"was/were", pp:"been", t:"essere", g:"group-diversi", h:"6. Tutti Diversi"},
            {b:"break", p:"broke", pp:"broken", t:"rompere", g:"group-diversi"},
            {b:"choose", p:"chose", pp:"chosen", t:"scegliere", g:"group-diversi"},
            {b:"do", p:"did", pp:"done", t:"fare", g:"group-diversi"},
            {b:"draw", p:"drew", pp:"drawn", t:"disegnare", g:"group-diversi"},
            {b:"drive", p:"drove", pp:"driven", t:"guidare", g:"group-diversi"},
            {b:"eat", p:"ate", pp:"eaten", t:"mangiare", g:"group-diversi"},
            {b:"fall", p:"fell", pp:"fallen", t:"cadere", g:"group-diversi"},
            {b:"fly", p:"flew", pp:"flown", t:"volare", g:"group-diversi"},
            {b:"forget", p:"forgot", pp:"forgotten", t:"dimenticare", g:"group-diversi"},
            {b:"give", p:"gave", pp:"given", t:"dare", g:"group-diversi"},
            {b:"go", p:"went", pp:"gone", t:"andare", g:"group-diversi"},
            {b:"grow", p:"grew", pp:"grown", t:"crescere", g:"group-diversi"},
            {b:"know", p:"knew", pp:"known", t:"sapere", g:"group-diversi"},
            {b:"see", p:"saw", pp:"seen", t:"vedere", g:"group-diversi"},
            {b:"speak", p:"spoke", pp:"spoken", t:"parlare", g:"group-diversi"},
            {b:"steal", p:"stole", pp:"stolen", t:"rubare", g:"group-diversi"},
            {b:"take", p:"took", pp:"taken", t:"prendere", g:"group-diversi"},
            {b:"wear", p:"wore", pp:"worn", t:"indossare", g:"group-diversi"},
            {b:"write", p:"wrote", pp:"written", t:"scrivere", g:"group-diversi"}
        ];

        // Popola tabella
        const tbody = document.getElementById('tableBody');
        verbs.forEach(v => {
            if(v.h) {
                const hRow = document.createElement('tr');
                hRow.className = `group-header ${v.g.replace('group-', 'bg-')}-600`;
                hRow.innerHTML = `<td colspan="4">${v.h}</td>`;
                tbody.appendChild(hRow);
            }
            const row = document.createElement('tr');
            row.className = v.g;
            row.innerHTML = `<td class="font-bold">${v.b}</td><td>${v.p}</td><td>${v.pp}</td><td class="italic text-gray-600">${v.t}</td>`;
            tbody.appendChild(row);
        });

        let currentVerb = null;
        let points = 0;
        let isChecked = false; // Stato per gestire il doppio Invio

        // Gestione tastiera
        document.addEventListener('keydown', (e) => {
            const active = document.activeElement;
            const isInput = active.classList.contains('quiz-input');

            // SPAZIO -> Passa alla prossima casella
            if (e.code === 'Space' && isInput) {
                e.preventDefault();
                const inputs = Array.from(document.querySelectorAll('.quiz-input:not(:disabled)'));
                const currentIndex = inputs.indexOf(active);
                if (currentIndex < inputs.length - 1) {
                    inputs[currentIndex + 1].focus();
                }
            }

            // INVIO -> Controlla o Prossimo
            if (e.code === 'Enter') {
                if (!isChecked) {
                    checkQuiz();
                } else {
                    newQuestion();
                }
            }
        });

        function newQuestion() {
            isChecked = false;
            currentVerb = verbs[Math.floor(Math.random() * verbs.length)];
            const modes = ['t', 'b', 'p', 'pp'];
            const mode = modes[Math.floor(Math.random() * modes.length)];

            document.getElementById('quizFeedback').classList.add('hidden');
            const inputs = ['qBase', 'qPast', 'qPart'];
            inputs.forEach(id => {
                const el = document.getElementById(id);
                el.value = "";
                el.disabled = false;
                el.classList.remove('given-form', 'bg-green-100', 'bg-red-100', 'text-indigo-600');
            });
            document.getElementById('tradDisplay').classList.add('hidden');

            const hintH3 = document.getElementById('targetHint');
            const instr = document.getElementById('quizInstruction');

            if (mode === 't') {
                instr.innerText = "Traduci in inglese:";
                hintH3.innerText = currentVerb.t.toUpperCase();
            } else if (mode === 'b') {
                instr.innerText = "Completa dalla Base:";
                hintH3.innerText = currentVerb.b;
                fillAndLock('qBase', currentVerb.b);
            } else if (mode === 'p') {
                instr.innerText = "Completa dal Past Simple:";
                hintH3.innerText = currentVerb.p;
                fillAndLock('qPast', currentVerb.p);
            } else {
                instr.innerText = "Completa dal Participle:";
                hintH3.innerText = currentVerb.pp;
                fillAndLock('qPart', currentVerb.pp);
            }

            if(mode !== 't') {
                document.getElementById('tradDisplay').classList.remove('hidden');
                document.getElementById('valTrad').innerText = currentVerb.t;
            }

            // Metti il focus sulla prima casella disponibile
            setTimeout(() => {
                const firstInput = document.querySelectorAll('.quiz-input:not(:disabled)')[0];
                if(firstInput) firstInput.focus();
            }, 50);
        }

        function fillAndLock(id, val) {
            const el = document.getElementById(id);
            el.value = val;
            el.disabled = true;
            el.classList.add('given-form');
        }

        function showHint() {
            const qBase = document.getElementById('qBase');
            if(!qBase.disabled) {
                qBase.value = currentVerb.b;
                qBase.classList.add('text-indigo-600');
            }
        }

        function checkQuiz() {
            if(isChecked) return;
            isChecked = true;

            const b = document.getElementById('qBase').value.trim().toLowerCase();
            const p = document.getElementById('qPast').value.trim().toLowerCase();
            const pp = document.getElementById('qPart').value.trim().toLowerCase();

            const check = (val, target) => {
                if(target.includes('/')) {
                    return target.split('/').some(t => t.trim().toLowerCase() === val);
                }
                return val === target.toLowerCase();
            };

            const isB = check(b, currentVerb.b);
            const isP = check(p, currentVerb.p);
            const isPP = check(pp, currentVerb.pp);

            updateInputColor('qBase', isB);
            updateInputColor('qPast', isP);
            updateInputColor('qPart', isPP);

            const feedback = document.getElementById('quizFeedback');
            feedback.classList.remove('hidden');
            
            if(isB && isP && isPP) {
                feedback.innerText = "CORRETTO! 🌟 (Premi Invio per il prossimo)";
                feedback.className = "mb-6 p-4 rounded-xl text-lg font-bold bg-green-100 text-green-700";
                points += 10;
            } else {
                feedback.innerHTML = `Soluzione: <span class="text-indigo-600">${currentVerb.b} - ${currentVerb.p} - ${currentVerb.pp}</span> <br> <span class="text-sm font-normal">(Premi Invio per continuare)</span>`;
                feedback.className = "mb-6 p-4 rounded-xl text-lg font-bold bg-red-100 text-red-700";
                points = Math.max(0, points - 5);
            }
            document.getElementById('scoreCounter').innerText = "Punti: " + points;
        }

        function updateInputColor(id, isCorrect) {
            const el = document.getElementById(id);
            if(el.disabled) return;
            el.classList.add(isCorrect ? 'bg-green-100' : 'bg-red-100');
        }

        window.onload = newQuestion;
    </script>
</body>
</html>
